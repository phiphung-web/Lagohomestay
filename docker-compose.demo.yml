services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      DEMO_MODE: "true"
      SESSION_SECRET: ${SESSION_SECRET}
      NEXT_PUBLIC_SITE_URL: https://${LAGO_DOMAIN}
    ports:
      - "127.0.0.1:${LAGO_PORT:-3100}:3000"
    mem_limit: 768m
    cpus: 1.0
    pids_limit: 200
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
