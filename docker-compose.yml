services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lago
      POSTGRES_USER: lago
      POSTGRES_PASSWORD: lago
    volumes:
      - lago_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lago"]
      interval: 5s
      timeout: 5s
      retries: 10
  web:
    build: .
    environment:
      DATABASE_URL: postgresql://lago:lago@db:5432/lago?schema=public
      SESSION_SECRET: change-me-in-production-with-a-long-random-secret
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      DEMO_MODE: "false"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
volumes:
  lago_db:
